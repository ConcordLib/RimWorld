name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [core-released]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test (RW ${{ matrix.rw }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - { rw: '1.6', branch: 'public' }
          - { rw: '1.5', branch: 'version-1.5' }
    continue-on-error: ${{ matrix.experimental == true }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/local/.ghcup /opt/ghc /opt/hostedtoolcache/CodeQL /usr/share/swift /usr/share/miniconda /usr/local/share/powershell
          sudo docker image prune -af
          df -h /

      - name: Stage RimWorld reference image
        id: game
        uses: cryptiklemur/steam-game-image-action@v1
        with:
          app-id: '294100'
          branch: ${{ matrix.branch }}
          steam-username: ${{ vars.STEAM_USERNAME }}
          steam-config-vdf: ${{ secrets.STEAM_CONFIG_VDF_B64 }}
          image: ghcr.io/concordlib/rimworld-game
          registry-password: ${{ secrets.GITHUB_TOKEN }}
          runnable: 'false'

      - name: Extract game DLLs from the image
        run: |
          set -euo pipefail
          # The action always sets image-ref: the version tag when it built, the
          # branch-scoped latest-<branch> tag when the build-id gate skipped.
          IMG="${{ steps.game.outputs.image-ref }}"
          test -n "$IMG" || { echo "steam-game-image-action returned no image-ref" >&2; exit 1; }
          docker create --name rwgame "$IMG"
          mkdir -p /opt/rimworld
          docker cp rwgame:/game/. /opt/rimworld/
          docker rm -f rwgame
          test -n "$(find /opt/rimworld -name Assembly-CSharp.dll | head -1)" || { echo "Assembly-CSharp.dll not found under /opt/rimworld after extract" >&2; exit 1; }

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Install mono
        run: |
          sudo apt-get update
          sudo apt-get install -y mono-complete

      - name: Build
        run: |
          set -euo pipefail
          DLLDIR=$(dirname "$(find /opt/rimworld -name Assembly-CSharp.dll | head -1)")
          dotnet build Concord.RimWorld.slnx -c Release -p:RimWorldManaged="$DLLDIR"

      - name: Test (net472 under mono)
        run: |
          set -euo pipefail
          RUNNER=$(find ~/.nuget/packages/xunit.runner.console -name xunit.console.exe -path '*net472*' | sort -V | tail -1)
          TESTDLL=$(find Source/ConcordRimWorld.Tests/bin/Release -name ConcordRimWorld.Tests.dll | head -1)
          mono "$RUNNER" "$TESTDLL"

  release:
    name: Release
    needs: build-and-test
    if: github.event_name == 'push' || github.event_name == 'repository_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # The repository_dispatch path commits and pushes the Core package-version bump.
          persist-credentials: true

      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/local/.ghcup /opt/ghc /opt/hostedtoolcache/CodeQL /usr/share/swift /usr/share/miniconda /usr/local/share/powershell
          sudo docker image prune -af
          df -h /

      - name: Synthetic bump for Core release
        if: github.event_name == 'repository_dispatch'
        env:
          CORE_VERSION: ${{ github.event.client_payload.core_version }}
        run: |
          set -euo pipefail
          PACKAGE_VERSION="${CORE_VERSION#v}"
          test -n "$PACKAGE_VERSION" || { echo "core-released did not provide a version" >&2; exit 1; }
          dotnet add Source/ConcordRimWorld.Tests/ConcordRimWorld.Tests.csproj package Concord.Runtime --version "$PACKAGE_VERSION" --no-restore
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Source/ConcordRimWorld.Tests/ConcordRimWorld.Tests.csproj
          git commit --allow-empty -m "fix(core): rebuild against Concord ${CORE_VERSION:-latest}"
          git push origin HEAD:main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Stage RimWorld reference image
        id: game
        uses: cryptiklemur/steam-game-image-action@v1
        with:
          app-id: '294100'
          branch: public
          steam-username: ${{ vars.STEAM_USERNAME }}
          steam-config-vdf: ${{ secrets.STEAM_CONFIG_VDF_B64 }}
          image: ghcr.io/concordlib/rimworld-game
          registry-password: ${{ secrets.GITHUB_TOKEN }}
          runnable: 'false'

      - name: Extract game DLLs from the image
        run: |
          set -euo pipefail
          # The action always sets image-ref: the version tag when it built, the
          # branch-scoped latest-<branch> tag when the build-id gate skipped.
          IMG="${{ steps.game.outputs.image-ref }}"
          test -n "$IMG" || { echo "steam-game-image-action returned no image-ref" >&2; exit 1; }
          docker create --name rwgame "$IMG"
          mkdir -p /opt/rimworld
          docker cp rwgame:/game/. /opt/rimworld/
          docker rm -f rwgame
          test -n "$(find /opt/rimworld -name Assembly-CSharp.dll | head -1)" || { echo "Assembly-CSharp.dll not found under /opt/rimworld after extract" >&2; exit 1; }

      - name: Build the mod
        run: |
          set -euo pipefail
          DLLDIR=$(dirname "$(find /opt/rimworld -name Assembly-CSharp.dll | head -1)")
          dotnet build Concord.RimWorld.slnx -c Release -p:RimWorldManaged="$DLLDIR"

      - name: Stage the shipped runtime dll
        run: |
          set -euo pipefail
          RUNTIME=$(find ~/.nuget/packages/concord.runtime -path '*net472/Concord.dll' | sort -V | tail -1)
          test -n "$RUNTIME" || { echo "No net472 Concord.Runtime in the NuGet cache: the pinned Concord.Runtime version predates lib/net472. Bump the pin in Source/ConcordRimWorld.Tests/ConcordRimWorld.Tests.csproj to a release that ships it." >&2; exit 1; }
          cp "$RUNTIME" Current/Assemblies/0Concord.dll

      - name: Install semantic-release
        run: npm install --no-save semantic-release@24 conventional-changelog-conventionalcommits@9 semantic-release-steam@2

      - name: Set up SteamCMD
        uses: buildalon/setup-steamcmd@v1

      - name: Restore Steam config
        env:
          STEAM_CONFIG_VDF_B64: ${{ secrets.STEAM_CONFIG_VDF_B64 }}
        run: |
          mkdir -p "$STEAM_DIR/config"
          printf '%s' "$STEAM_CONFIG_VDF_B64" | base64 -d > "$STEAM_DIR/config/config.vdf"
          echo "STEAM_CONFIG_VDF=$STEAM_DIR/config/config.vdf" >> "$GITHUB_ENV"

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STEAM_USERNAME: ${{ vars.STEAM_USERNAME }}
          STEAM_CONFIG_VDF: ${{ env.STEAM_CONFIG_VDF }}
          STEAMCMD_PATH: ${{ env.STEAM_CMD }}/steamcmd.sh
        run: npx -y -p semantic-release@24 -p conventional-changelog-conventionalcommits@9 -p semantic-release-steam@2 semantic-release
